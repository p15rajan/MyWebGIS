<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>My First WebMap</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<link rel="stylesheet" href="source/jquery-ui.min.css">
	<link rel="stylesheet" href="plugins/sidebar/L.Control.Sidebar.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
	<link rel="stylesheet" href="plugins/mouseposition/L.Control.MousePosition.css">
	<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css"/>
	<link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css">




	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet-src.js">></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
    <script src="source/jquery-ui.min.js"></script>	
    <script src="plugins/sidebar/L.Control.Sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
	<script src="plugins/mouseposition/L.Control.MousePosition.js"></script>
	<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
	<script src="plugins/minimap/Control.MiniMap.min.js"></script>
	<script src="plugins/Ajax/Leaflet.ajax.js"></script>
	
	<style>
		.bold {
			font-weight: bold;
			font-size: 16px;
		}

	</style>

</head>
<body>

	<div id="sidebar" class="col-mid-3">
		<div id="divValve" class="col-xs-12">
			<div id class = "col-xs-12"> 
	 			<p class="text-center bold">Valve Information</p>
			</div>

		</div>
	</div>

	<div id="Mapdiv" class="col-mid-12"></div>

 	<script>
  		
		var mymap;
		var baseLayers ;
		var overlays;


 		mymap = L.map('Mapdiv', {
    	center: [23.73475303726212, 90.43980350460376],
    	zoom: 23,
    	attributionControl:false,
    	zoomControl :false

		});

		
 		var OpenStreetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 23}).addTo(mymap);

 		var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {maxZoom: 23});

 						

 		var GoogleStreetMap = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {maxZoom: 23, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']});

 		//GoogleStreetMap.addTo(mymap);

 		var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:23});
 		
 		var Esri_WorldImagery_minimap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:23});

		//SideBar
		var sidebar = L.control.sidebar('sidebar', 
			{position: 'left'});
		
		mymap.addControl(sidebar);

		// Show sidebar
		
		L.easyButton('glyphicon-transfer', function(){

			sidebar.toggle()
    	
			}).addTo(mymap);


		//SCALE

		L.control.scale({position:'bottomleft', maxWidth :200, imperial:false}).addTo(mymap);

		//ZOOM CONTROL

		L.control.zoom({position:'topright'}).addTo(mymap);

		//MEASURE DISTANCE 

		L.control.polylineMeasure({position:'topright'}).addTo(mymap);

		//MOUSE POSITION 

		L.control.mousePosition({position:'bottomright'}).addTo(mymap);


		//TOOL BAR  OR GEOMAN

		mymap.pm.addControls({  
  			position: 'topleft',  
  			drawCircleMarker: false,
  			rotateMode: false,
		}); 


		mymap.on("pm:create", function(e){
			 console.log(e);
		});

		//Minimap 

		var miniMap = new L.Control.MiniMap(Esri_WorldImagery_minimap,{
			position:'bottomright',
			height:150,
			width:150
		}).addTo(mymap);


		//LAYER CONTROL

		baseLayers = {
    	"OSM": OpenStreetMap,
    	"Google Streets": GoogleStreetMap,
    	"ESRI Imagery":Esri_WorldImagery_minimap,
		"OpenTopo Map": OpenTopoMap 
		};
		
	   var control_layer = L.control.layers(baseLayers, overlays).addTo(mymap);

	   //ADDING DATA LAYERS

	   //VALVES
           
	   var valves = L.geoJSON.ajax("plugins/data/valves_105.geojson", {pointToLayer:style_valves}).addTo(mymap);

	   valves.on('data.loaded', function()  {
	   	mymap.fitBounds(valves.getBounds());
	   });

	   function style_valves(json, latlng) {
	   	var att = json.properties;
	   	var color;
	   	var fill_color;
	   	var radius = 5;
	   	var fillOpacity = 1;


	   	switch (att.type) {
				case 'Air Release Valve':
					color = '#d35400';
					fill_color = '#d35400';
					break;
				case 'Gate Valve':
					color = '#2E86C1';
					fill_color = '#2E86C1';
					break;
				case 'Washout Valve':
					color = '#8E44AD';
					fill_color = '#8E44AD';
					break;
				default:
					color = '#16A085';
					fill_color = '#16A085';
					break;
			}

	   
	   	var style = {radius:radius,color:color, fillColor:fill_color,fillOpacity:fillOpacity};
	    

	    return L.circleMarker(latlng, style).bindTooltip("Valve Id: "+ att.valve_id +"<br> Valve Type: "+att.type+"<br> Diameter(mm): " +att.diameter+"<br>Location: "+att.location);


	   	}
	   	 
	   	control_layer.addOverlay(valves, "Valves");

	   	//PIPELINES

	   	var pipelines = L.geoJSON.ajax("plugins/data/pipeline_105.geojson", {style:style_pipelines, onEachFeature:process_pipelines}).addTo(mymap);

	   	function style_pipelines(json) {
			var att = json.properties;

			switch (att.category) {
				case 'Distribution Pipeline':
					color = '#2980B9';
					break;
				case 'Reticulation Pipeline':
					color = '#FFA07A';
					break;
				case 'Transmission Pipeline':
					color = '#16A085';
					break;
				default:
					color = '#17202A';
					break;
			}

			return {color:color};
		}

		function process_pipelines(json, lyr) {

			var att = json.properties;
			
			lyr.bindTooltip("Pipe ID:"+att.pipe_id+"<br>Diamter:"+att.diameter+" meter"+"<br>Location:" +att.location+"<br>Category:" +att.category+"<br>Length:"+att.length);
	   	
	   		   	
	   	}

	   	control_layer.addOverlay(pipelines, "Pipelines");

	   	//BUILDINGS 

	   	var buildings = L.geoJSON.ajax("plugins/data/Bld_105.geojson", {style:style_buildings, onEachFeature:process_buildings}).addTo(mymap);

	   	function style_buildings(json) {
	   		var att = json.properties;
	   		var storey = att.storey 
	   		var color;
	   		var fill_color;
	   		var fill_opacity = 1;

	   		switch (att.category) {
	   			case 'Building':
					if (storey >= 10) {
						color = '#c0392b';
						fill_color = '#c0392b';
					} else if (storey >= 8) {
						color = '#cd6155';
						fill_color = '#cd6155';
					} else if (storey >= 5) {
						color = '#d98880';
						fill_color = '#d98880';
					} else if (storey >= 3) {
						color = '#e6b0aa';
						fill_color = '#e6b0aa';
					} else {
						color = '#f2d7d5';
						fill_color = '#f2d7d5';
					}
	   				break;
	   			case 'Tin Shed':
					color = '#BDB76B';
					fill_color = '#BDB76B';
					fill_opacity = 0.8;
					break;
				case 'Open Plot':
					color = '#808000';
					fill_color = '#808000';
					break;
				default:
					color = 'black';
					fill_color = 'black';
					break;
	   		}

	   		return{color:color, fillColor:fill_color, fillOpacity:fill_opacity};
	   	}
		
			function process_buildings(json, lyr) {

			var att = json.properties;
			
			lyr.bindPopup("Building ID:"+att.BLD_ID+"<br>Storey:"+att.storey+"<br>Location:" +att.location+"<br>Account No:" +att.account_no);
	   	
	   		  	
	   	}

	   	control_layer.addOverlay(buildings,"Buildings");


 	</script>
	
</body>
</html>
