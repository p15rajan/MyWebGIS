<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>First WebMap</title>

	<link rel="stylesheet" href="styles.css">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<link rel="stylesheet" href="source/jquery-ui.min.css">
	<link rel="stylesheet" href="plugins/sidebar/L.Control.Sidebar.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
	<link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
	<link rel="stylesheet" href="plugins/mouseposition/L.Control.MousePosition.css">
	<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css"/>
	<link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css">
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet-src.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
	<script src="source/jquery-ui.min.js"></script>
	<script src="plugins/sidebar/L.Control.Sidebar.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
	<script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
	<script src="plugins/mouseposition/L.Control.MousePosition.js"></script>
	<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
	<script src="plugins/minimap/Control.MiniMap.min.js"></script>
	<script src="plugins/ajax/leaflet.ajax.js"></script>

	<style>
		.bold {
			font-weight: bold;
			font-size: 16px;
		}

		.errorMsg {
			padding: 0;
			text-align: center;
			background-color: darksalmon;
		}
	</style>


</head>
<body>

	<div id="sidebar" class="col-md-3">
		<div id="divValve" class="col-xs-12">

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="col-xs-12">
				<p class="text-center bold">Valve Information</p>
			</div>
			<div class="col-xs-12 errorMsg" id="valve_error"></div>

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="form-group">
				<div class="col-xs-6">
					<input type="text" id="valve_id" class="form-control" placeholder="Valve ID">
				</div>
				<div class="col-xs-6">
					<button id="findValve" class="btn btn-primary btn-block">Find Valve</button>
				</div>
			</div>

			<div class="col-xs-12" style="height: 15px;"></div>

			<div class="col-xs-12" id="valve_information">
				
			</div>
			
		</div>

		<div class="col-xs-12" style="height: 50px;"></div>

		<div id="divPipeline" class="col-xs-12">

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="col-xs-12">
				<p class="text-center bold">Pipeline Information</p>
			</div>
			<div class="col-xs-12 errorMsg" id="pipeline_error"></div>

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="form-group">
				<div class="col-xs-6">
					<input type="text" id="pipeline_id" class="form-control" placeholder="Pipeline ID">
				</div>
				<div class="col-xs-6">
					<button id="findPipeline" class="btn btn-primary btn-block">Find Pipeline</button>
				</div>
			</div>

			<div class="col-xs-12" style="height: 15px;"></div>

			<div class="col-xs-12" id="pipeline_information">
				
			</div>
			
		</div>

		<div class="col-xs-12" style="height: 50px;"></div>

		<div id="divBuilding" class="col-xs-12">

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="col-xs-12">
				<p class="text-center bold">Building Information</p>
			</div>
			<div class="col-xs-12 errorMsg" id="building_error"></div>

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="form-group">
				<div class="col-xs-6">
					<input type="text" id="building_id" class="form-control" placeholder="Building Account Number">
				</div>
				<div class="col-xs-6">
					<button id="findBuilding" class="btn btn-primary btn-block">Find Building</button>
				</div>
			</div>

			<div class="col-xs-12" style="height: 15px;"></div>

			<div class="col-xs-12" id="building_information">
				
			</div>
			
		</div>
	</div>

	<div id="mapdiv" class="col-md-12"></div>


	<script>

		var mymap;
		var baseLayers;
		var overlays;
		var lyrSearch;

		var valves_array = [];
		var pipelines_array = [];
		var buildings_array = [];

		
		mymap = L.map('mapdiv', {
		    center: [23.78573, 90.44378],
		    zoom: 12,
		    attributionControl: false,
		    zoomControl: false
		});

		var GoogleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
				                maxZoom: 23,
				                subdomains:['mt0','mt1','mt2','mt3']
				                });

		var openStreetMap =  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png?', {maxZoom:23});

		var CartoDB_Positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {maxZoom: 23});

		var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom: 23});

		var Esri_WorldImagery_minimap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom: 23});

		var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
		            maxZoom: 23
		        });

		GoogleStreets.addTo(mymap);



		//SIDEBAR
		var sidebar = L.control.sidebar('sidebar', {
		    position: 'left'
		});

		mymap.addControl(sidebar);

		//EASY BUTTON

		L.easyButton('glyphicon-transfer', function(){
		   sidebar.toggle();
		}).addTo(mymap);

		//SCALE
		L.control.scale({position:'bottomleft', maxWidth:'200', imperial:false}).addTo(mymap);

		//ZOOM CONTROL
		L.control.zoom({position:'topright'}).addTo(mymap);

		//MEASURE
		L.control.polylineMeasure({position:'topright'}).addTo(mymap);

		//MOUSE POSITION
		L.control.mousePosition({position:'bottomright'}).addTo(mymap);

		//DRAW CONTROL OR GEOMAN
		mymap.pm.addControls({  
		  position: 'topleft',  
		  drawCircleMarker: false,
		  rotateMode: false,
		}); 


		mymap.on("pm:create", function(e){
			console.log(e);
		});

		//MINIMAP
		var miniMap = new L.Control.MiniMap(Esri_WorldImagery_minimap,{
			position:'bottomright',
			height: 150,
			width: 150
		}).addTo(mymap);


		//LAYER CONTROL
		baseLayers = {
		    "Google Streets": GoogleStreets,
		    "OSM": openStreetMap,
		    "CartoDB Positron": CartoDB_Positron,
		    "Esri Imagery": Esri_WorldImagery,
		    "Open Topo Map": OpenTopoMap
		};


		var control_layers =  L.control.layers(baseLayers, overlays).addTo(mymap);


		//DATA LOADING OPERATIONS

		//VALVE
		var valves = L.geoJSON.ajax('data/valves_105.geojson',{pointToLayer:style_valves}).addTo(mymap);


		valves.on('data:loaded', function(){
			mymap.fitBounds(valves.getBounds());
			$("#valve_id").autocomplete({
				source:valves_array
			});
		});

		function style_valves(json, latlng) {
			var att = json.properties;
			var color;
			var fill_color;
			var radius = 5;
			var fillOpacity = 1;

			valves_array.push(att.valve_id);

			switch (att.type) {
				case 'Air Release Valve':
					color = '#d35400';
					fill_color = '#d35400';
					break;
				case 'Gate Valve':
					color = '#2E86C1';
					fill_color = '#2E86C1';
					break;
				case 'Washout Valve':
					color = '#8E44AD';
					fill_color = '#8E44AD';
					break;
				default:
					color = '#16A085';
					fill_color = '#16A085';
					break;
			}

			var style = {radius:radius, color:color, fillColor:fill_color, fillOpacity:fillOpacity};

			return L.circleMarker(latlng, style).bindTooltip("Valve ID: "+att.valve_id+"<br>Valve Type: "+att.type+"<br>Diameter (mm): "+att.diameter+"<br>Location: "+att.location);

		}

		control_layers.addOverlay(valves, "Valves");

		$("#findValve").click(function(){
			var valve_id = $("#valve_id").val();

			var lyr = returnLayerByAttribute(valves, "valve_id", valve_id);

			if (lyr) {
				var att = lyr.feature.properties;

				if (lyrSearch) {
					lyrSearch.remove();
				}

				lyrSearch = L.circle(lyr.getLatLng(), {radius:10, color:'red', weight:10, opacity:0.6, fillOpacity:0.3}).addTo(mymap);

				mymap.setView(lyr.getLatLng(), 21);
				valves.bringToFront();

				$("#valve_information").html("Valve Type: "+att.type+"<br>DMA ID: "+att.dma_id+"<br>Diameter (mm): "+att.diameter+"<br>Turn Status: "+att.turn+"<br>Visibility: "+att.visibility+"<br>Location: "+att.location);
			} else {
				$("#valve_error").html("Valve not found!");
			}

		});


		//PIPELINES
		var pipelines = L.geoJSON.ajax('data/pipelines_105.geojson',{style:style_pipelines, onEachFeature:process_pipelines}).addTo(mymap);

		$("#pipeline_id").autocomplete({
			source:pipelines_array
		});

		function style_pipelines(json) {
			var att = json.properties;

			switch (att.category) {
				case 'Distribution Pipeline':
					color = '#2980B9';
					break;
				case 'Reticulation Pipeline':
					color = '#FFA07A';
					break;
				case 'Transmission Pipeline':
					color = '#16A085';
					break;
				default:
					color = '#17202A';
					break;
			}

			return {color:color};
		}

		function process_pipelines(json, lyr) {
			var att = json.properties;

			pipelines_array.push(att.pipe_id);

			lyr.bindTooltip("Pipe ID: "+att.pipe_id+"<br>Diameter: "+att.diameter+" mm"+"<br>Location: "+att.location+"<br>Category: "+att.category+"<br>Length: "+att.length);
		}


		control_layers.addOverlay(pipelines, "Pipelines");

		$("#findPipeline").click(function(){
			var pipeline_id = $("#pipeline_id").val();

			var lyr = returnLayerByAttribute(pipelines, "pipe_id", pipeline_id);

			if (lyr) {
				var att = lyr.feature.properties;

				if (lyrSearch) {
					lyrSearch.remove();
				}

				lyrSearch = L.geoJSON(lyr.toGeoJSON(), {style:{color:'red', weight:10, opacity:0.5}}).addTo(mymap);

				mymap.fitBounds(lyr.getBounds());
				pipelines.bringToFront();

				$("#pipeline_information").html("Category: "+att.category+"<br>DMA ID: "+att.dma_id+"<br>Material: "+att.material+"<br>Length: "+att.length+"<br>Location: "+att.location);
			} else {
				$("#pipeline_error").html("Pipeline not found!");
			}

		});


		//BUILDINGS
		var buildings = L.geoJSON.ajax('data/buildings_105.geojson',{style:style_buildings, onEachFeature:process_buildings}).addTo(mymap);

		$("#building_id").autocomplete({
			source:buildings_array
		});

		function style_buildings(json) {
			var att = json.properties;
			var storey = att.storey;
			var color;
			var fill_color;
			var fill_opacity = 1;

			switch (att.category) {
				case 'Building':
					if (storey >= 10) {
						color = '#c0392b';
						fill_color = '#c0392b';
					} else if (storey >= 8) {
						color = '#cd6155';
						fill_color = '#cd6155';
					} else if (storey >= 5) {
						color = '#d98880';
						fill_color = '#d98880';
					} else if (storey >= 3) {
						color = '#e6b0aa';
						fill_color = '#e6b0aa';
					} else {
						color = '#f2d7d5';
						fill_color = '#f2d7d5';
					}
					break;
				case 'Tin Shed':
					color = '#BDB76B';
					fill_color = '#BDB76B';
					fill_opacity = 0.8;
					break;
				case 'Open Plot':
					color = '#808000';
					fill_color = '#808000';
					break;
				default:
					color = 'black';
					fill_color = 'black';
					break;
			}

			return {color:color, fillColor:fill_color, fillOpacity:fill_opacity};
		}

		function process_buildings(jsn, lyr) {
			var att = jsn.properties;

			buildings_array.push(att.account_no);

			lyr.bindPopup("Category: "+att.category+"<br>Storey: "+att.storey+"<br>Location: "+att.location+"<br>Account Number: "+att.account_no);
		}

		control_layers.addOverlay(buildings, "Buildings");

		$("#findBuilding").click(function(){
			var building_id = $("#building_id").val();

			var lyr = returnLayerByAttribute(buildings, "account_no", building_id);

			if (lyr) {
				var att = lyr.feature.properties;

				if (lyrSearch) {
					lyrSearch.remove();
				}

				lyrSearch = L.geoJSON(lyr.toGeoJSON(), {style:{color:'red', weight:10, opacity:1, fillOpacity:0}}).addTo(mymap);

				mymap.fitBounds(lyr.getBounds());
		
				$("#building_information").html("Cateogory: "+att.category+"<br>Storey: "+att.storey+"<br>Population: "+att.population+"<br>Location: "+att.location+"<br>DMA ID: "+att.dma_id);
			} else {
				$("#building_error").html("Building not found!");
			}

		});


		//GENERAL FUNCTIONS
		function returnLayerByAttribute(layer, attribute_name, attribute_value) {

			var all_layers = layer.getLayers();

			for (var i=0; i<all_layers.length; i++) {
				var retained_value = all_layers[i].feature.properties[attribute_name];

				if (retained_value == attribute_value) {
					return all_layers[i];
				}
			}

			return false;
		}

	</script>
	
</body>
</html>
